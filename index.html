<!DOCTYPE html>
<!-- Bug 12 Fix: Removed dir="auto". Direction is dynamically set via JS based on the user's browser language to ensure RTL users get a true mirrored layout. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camp & Trip Planner</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2F4F4F; /* Dark Slate Gray */
            --accent-color: #D2691E; /* Chocolate/Wood */
            --bg-color: #F5F5DC; /* Beige */
            --text-color: #333;
            --error-color: #d32f2f;
            --focus-ring: 3px solid #D2691E;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Progressive enhancement for mobile viewports */
            min-height: 100vh; /* Fallback for older browsers */
            min-height: 100dvh; /* Prevents keyboard clipping on modern mobile browsers */
            
            margin: 0;
            padding: 1rem;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Focus management for accessibility */
        h1:focus { outline: none; }
        button:focus-visible {
            outline: var(--focus-ring);
            outline-offset: 2px;
        }

        h1 { color: var(--primary-color); margin-top: 0; }
        p { color: #666; margin-bottom: 2rem; line-height: 1.5; }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 1rem;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        button:hover:not(:disabled) { background-color: var(--accent-color); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* Secondary Button (Retry) */
        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: rgba(47, 79, 79, 0.1);
        }

        /* Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        .btn-spinner {
            border-top: 3px solid white;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .global-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem auto;
        }

        .hidden { display: none !important; }
        
        .error-message { 
            color: var(--error-color); 
            font-size: 14px; 
            margin-bottom: 15px; 
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
            border-left: 4px solid var(--error-color);
            text-align: left;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Polite live region for screen reader announcements -->
    <div id="sr-announcer" class="sr-only" aria-live="polite"></div>

    <div class="container">
        <!-- Initial Loading State -->
        <div id="app-loading">
            <div class="spinner global-spinner" aria-hidden="true"></div>
            <p>Loading your planner...</p>
        </div>
        
        <!-- Global Error Boundary UI -->
        <div id="init-error" class="error-message hidden" role="alert"></div>
        <!-- Bug 11 Fix: Retry button for CDN drops or Firebase timeouts -->
        <button id="retry-btn" class="btn-secondary hidden">Try Again</button>

        <!-- Login View -->
        <div id="login-view" class="hidden">
            <h1 id="login-heading" tabindex="-1">🏕️ Outdoor Planner</h1>
            <p>Plan your Camp, RV Trip, or Picnic effortlessly.</p>
            
            <button id="login-btn" aria-label="Continue with Google">
                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9086c1.7018-1.5668 2.6836-3.874 2.6836-6.615z"></path><path fill="#34A853" d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9086-2.2581c-.8059.54-1.8368.859-3.0478.859-2.344 0-4.3282-1.5831-5.036-3.7104H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z"></path><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.2822-1.1168-.2822-1.71s.1023-1.17.2823-1.71V4.9582H.9573A8.9965 8.9965 0 0 0 0 9c0 1.4523.3477 2.8268.9573 4.0418L3.964 10.71z"></path><path fill="#EA4335" d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.426 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9582L3.964 7.29C4.6718 5.1627 6.6559 3.5795 9 3.5795z"></path></svg>
                <span aria-hidden="true">Continue with Google</span>
                <div class="spinner btn-spinner hidden" id="login-spinner" aria-hidden="true"></div>
            </button>
            <div id="login-error" class="error-message hidden" role="alert"></div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="hidden">
            <img id="user-photo" src="" alt="User Profile" class="profile-pic hidden" />
            <h1 id="dashboard-heading" tabindex="-1">Welcome, <span id="user-name"></span>! 🎒</h1>
            <p id="user-email" class="sr-only"></p>
            <p>Ready to plan your next adventure?</p>
            
            <button id="logout-btn">
                Log Out
                <div class="spinner btn-spinner hidden" id="logout-spinner" aria-hidden="true"></div>
            </button>
            <div id="logout-error" class="error-message hidden" role="alert"></div>
        </div>
    </div>

    <script type="module">
        /**
         * BUG HISTORY & FIXES LOG (30 Bugs Fixed)
         * ---------------------------------------------------------------------------------------------------
         * ITERATION 1 (18 Bugs):
         * Fixed App Crash on Hot Reload, Fixed SPA Memory Leak, Fixed Returning User Focus, 
         * Added CDN Error Boundary, Fixed Safari ITP breakage, Fixed Infinite Spinner, 
         * Synced Device Language, Fixed Broken Photo UI, Added Explicit aria-labels, 
         * Handled Blank displayNames, Added dvh fallback, etc.
         * 
         * ITERATION 2 (12 New Bugs Fixed):
         * [Bug 1]: Fixed DOM Queries. Now executed inside an init routine guaranteeing elements exist.
         * [Bug 2]: Fixed unsubscribeAuth leak. Added 'beforeunload' event listener for genuine SPA teardown.
         * [Bug 3]: Fixed authTimeout clash. clearTimeout(authTimeout) is explicitly called inside the try/catch.
         * [Bug 4]: Fixed stale error text flashes. Cleared .textContent *before* making the element visible.
         * [Bug 5]: Fixed userPhoto.onerror reassignment leak. Mapped strictly once during setup phase.
         * [Bug 6]: Fixed 50ms Screen Reader Magic Number. Fixed by appending a new DOM node dynamically.
         * [Bug 7]: Fixed Active Buttons on Failure. Disabled buttons via state logic if init catches.
         * [Bug 8]: Fixed HTTPS Unhandled Exception. Used a graceful `return` and UI display instead of `throw`.
         * [Bug 9]: Fixed Static Profile `alt` Text. Dynamically updates `alt` to "Profile photo of [Name]".
         * [Bug 10]: Fixed `role="alert"` timing. Set text inside DOM elements *before* removing `.hidden`.
         *[Bug 11]: Fixed No Retry on Timeout/CDN drop. Added explicit Retry button that resets and re-calls initApp.
         * [Bug 12]: Fixed RTL `dir="auto"`. Explicitly map RTL layout to browser's true language locale.
         * ---------------------------------------------------------------------------------------------------
         */

        const DOM = {};
        let authTimeout;
        let isAuthResolved = false;
        let previousAuthState = null;

        // Bootstrap App Setup
        function bootstrap() {
            // Bug 1 Fix: All DOM Queries happen synchronously after document load
            DOM.appLoading = document.getElementById('app-loading');
            DOM.initError = document.getElementById('init-error');
            DOM.retryBtn = document.getElementById('retry-btn');
            DOM.loginView = document.getElementById('login-view');
            DOM.dashboardView = document.getElementById('dashboard-view');
            DOM.loginBtn = document.getElementById('login-btn');
            DOM.logoutBtn = document.getElementById('logout-btn');
            DOM.loginSpinner = document.getElementById('login-spinner');
            DOM.logoutSpinner = document.getElementById('logout-spinner');
            DOM.userNameDisplay = document.getElementById('user-name');
            DOM.userEmailDisplay = document.getElementById('user-email');
            DOM.userPhoto = document.getElementById('user-photo');
            DOM.loginError = document.getElementById('login-error');
            DOM.logoutError = document.getElementById('logout-error');
            DOM.loginHeading = document.getElementById('login-heading');
            DOM.dashboardHeading = document.getElementById('dashboard-heading');
            DOM.srAnnouncer = document.getElementById('sr-announcer');

            // Bug 12 Fix: Robust RTL support based on actual browser locale
            const userLang = navigator.language.split('-')[0];
            const rtlLangs = ['ar', 'he', 'fa', 'ur'];
            if (rtlLangs.includes(userLang)) {
                document.documentElement.dir = 'rtl';
            }

            // Bug 5 Fix: Assign onerror exactly once
            DOM.userPhoto.onerror = function() {
                this.classList.add('hidden');
            };

            DOM.retryBtn.addEventListener('click', () => {
                DOM.initError.classList.add('hidden');
                DOM.retryBtn.classList.add('hidden');
                DOM.appLoading.classList.remove('hidden');
                initApp();
            });

            // Ensure proper memory teardown (Bug 2 Fix)
            window.addEventListener('beforeunload', () => {
                if (typeof window.unsubscribeAuth === 'function') {
                    window.unsubscribeAuth();
                }
            });

            // Bug 8 Fix: Graceful HTTPS check (avoids throwing Unhandled Exceptions to monitoring tools)
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (window.location.protocol !== 'https:' && !isLocalhost) {
                DOM.appLoading.classList.add('hidden');
                DOM.initError.textContent = "Security Error: HTTPS connection required for secure sign-in.";
                DOM.initError.classList.remove('hidden');
                return;
            }

            initApp();
        }

        // Bug 6 Fix: Rock-solid screen reader announcement by creating new nodes
        function announceToScreenReader(message) {
            DOM.srAnnouncer.innerHTML = ''; 
            const msgNode = document.createElement('div');
            msgNode.textContent = message;
            DOM.srAnnouncer.appendChild(msgNode);
        }

        async function initApp() {
            isAuthResolved = false;
            if (authTimeout) clearTimeout(authTimeout);

            // Bug 3 & Bug 7 Fix: Set fallback for Firebase network hang, disable buttons
            authTimeout = setTimeout(() => {
                if (!isAuthResolved) {
                    DOM.appLoading.classList.add('hidden');
                    DOM.initError.textContent = "Connection is slow. Authentication is taking too long to respond.";
                    DOM.initError.classList.remove('hidden');
                    DOM.retryBtn.classList.remove('hidden');
                    DOM.loginBtn.disabled = true;
                    DOM.logoutBtn.disabled = true;
                }
            }, 10000);

            try {
                const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js");
                const { 
                    initializeAuth, 
                    getAuth,
                    signInWithPopup, 
                    GoogleAuthProvider, 
                    signOut, 
                    onAuthStateChanged,
                    browserLocalPersistence,
                    browserPopupRedirectResolver
                } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js");

                const firebaseConfig = {
                    apiKey: "AIzaSyBLGsNTiudr0Z8fGc2xc4hK4Nl96_vwPHc",
                    authDomain: "camp-cbf1d.firebaseapp.com",
                    projectId: "camp-cbf1d",
                    storageBucket: "camp-cbf1d.firebasestorage.app",
                    messagingSenderId: "879899618290",
                    appId: "1:879899618290:web:c71c1626e5a5fa0a96596b",
                    measurementId: "G-9R2C1174BG"
                };

                let app, auth;
                if (!getApps().length) {
                    app = initializeApp(firebaseConfig);
                    auth = initializeAuth(app, { persistence: browserLocalPersistence });
                } else {
                    app = getApp();
                    auth = getAuth(app);
                }

                auth.useDeviceLanguage();
                const provider = new GoogleAuthProvider();

                window.unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                    isAuthResolved = true;
                    clearTimeout(authTimeout); // Clears timeout properly upon successful init
                    
                    DOM.appLoading.classList.add('hidden');
                    DOM.loginBtn.disabled = false; // Restore button state if previously failed
                    DOM.logoutBtn.disabled = false;

                    if (user) {
                        let name = user.displayName ? user.displayName.trim() : '';
                        let displayFirstName = name.length > 0 ? name.split(' ')[0] : 'Camper';
                        
                        DOM.userNameDisplay.textContent = displayFirstName;
                        DOM.userEmailDisplay.textContent = `Logged in as ${user.email}`;
                        
                        if (user.photoURL) {
                            DOM.userPhoto.src = user.photoURL;
                            // Bug 9 Fix: Personalized alt text for screen readers
                            DOM.userPhoto.alt = `Profile photo of ${displayFirstName}`;
                            DOM.userPhoto.classList.remove('hidden');
                        } else {
                            DOM.userPhoto.classList.add('hidden');
                        }

                        DOM.loginView.classList.add('hidden');
                        DOM.dashboardView.classList.remove('hidden');

                        if (previousAuthState !== true) {
                            if (previousAuthState !== null) DOM.dashboardHeading.focus();
                            announceToScreenReader("Successfully signed in. Welcome to your dashboard.");
                        }
                        previousAuthState = true;

                    } else {
                        DOM.dashboardView.classList.add('hidden');
                        DOM.loginView.classList.remove('hidden');

                        if (previousAuthState !== false) {
                            if (previousAuthState !== null) {
                                DOM.loginHeading.focus();
                                announceToScreenReader("Successfully signed out.");
                            } else {
                                announceToScreenReader("Login page loaded.");
                            }
                        }
                        previousAuthState = false;
                    }
                });

                // Attach Handlers (Replacing previous to avoid duplicates on retry)
                DOM.loginBtn.onclick = async () => {
                    DOM.loginError.classList.add('hidden');
                    // Bug 4 Fix: Clear stale text BEFORE making it visible
                    DOM.loginError.textContent = '';

                    if (!navigator.onLine) {
                        // Bug 10 Fix: Text set BEFORE removing hidden, ensuring screen reader fires accurately
                        DOM.loginError.textContent = "You appear to be offline. Please check your connection.";
                        DOM.loginError.classList.remove('hidden');
                        return;
                    }

                    DOM.loginBtn.disabled = true;
                    DOM.loginSpinner.classList.remove('hidden');

                    try {
                        await signInWithPopup(auth, provider, browserPopupRedirectResolver);
                    } catch (error) {
                        const ignoredErrors =['auth/popup-closed-by-user', 'auth/cancelled-popup-request'];
                        if (!ignoredErrors.includes(error.code)) {
                            DOM.loginError.textContent = error.code === 'auth/network-request-failed' 
                                ? "Network error. Please check your internet connection." 
                                : "Failed to sign in. Please try again.";
                            DOM.loginError.classList.remove('hidden');
                        }
                    } finally {
                        DOM.loginBtn.disabled = false;
                        DOM.loginSpinner.classList.add('hidden');
                    }
                };

                DOM.logoutBtn.onclick = async () => {
                    DOM.logoutError.classList.add('hidden');
                    DOM.logoutError.textContent = '';
                    
                    DOM.logoutBtn.disabled = true;
                    DOM.logoutSpinner.classList.remove('hidden');

                    try {
                        await signOut(auth);
                    } catch (error) {
                        DOM.logoutError.textContent = "Failed to log out safely. Please check your connection.";
                        DOM.logoutError.classList.remove('hidden');
                    } finally {
                        DOM.logoutBtn.disabled = false;
                        DOM.logoutSpinner.classList.add('hidden');
                    }
                };

            } catch (error) {
                // Bug 3 Fix: Clear timeout so it doesn't overwrite this message
                clearTimeout(authTimeout);
                DOM.appLoading.classList.add('hidden');
                
                // Bug 10 Fix: Set text before making visible
                DOM.initError.textContent = "Failed to load application modules. Please disable ad-blockers or check your connection.";
                DOM.initError.classList.remove('hidden');
                
                // Bug 11 Fix: Display retry option
                DOM.retryBtn.classList.remove('hidden');
                
                // Bug 7 Fix: Ensure UI buttons don't appear falsely active
                if(DOM.loginBtn) DOM.loginBtn.disabled = true;
                if(DOM.logoutBtn) DOM.logoutBtn.disabled = true;
                
                console.error("Initialization Error:", error);
            }
        }

        // Initialize application once document is fully parsed
        document.addEventListener('DOMContentLoaded', bootstrap);
    </script>
</body>
</html>
