<!DOCTYPE html>
<!-- Bug 12 Fix: dir="auto" ensures RTL languages (Arabic, Hebrew, etc.) automatically mirror the layout correctly -->
<html lang="en" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camp & Trip Planner</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2F4F4F; /* Dark Slate Gray */
            --accent-color: #D2691E; /* Chocolate/Wood */
            --bg-color: #F5F5DC; /* Beige */
            --text-color: #333;
            --error-color: #d32f2f;
            --focus-ring: 3px solid #D2691E;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Bug 13 Fix & Doc: progressive enhancement for mobile viewports */
            /* 100vh is the fallback for older browsers (IE, old Safari/Chrome) */
            min-height: 100vh;
            /* 100dvh dynamically adjusts when the mobile keyboard/address bar appears, preventing layout clipping */
            min-height: 100dvh; 
            
            margin: 0;
            padding: 1rem;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Focus management for accessibility */
        h1:focus { outline: none; }
        button:focus-visible {
            outline: var(--focus-ring);
            outline-offset: 2px;
        }

        h1 { color: var(--primary-color); margin-top: 0; }
        p { color: #666; margin-bottom: 2rem; line-height: 1.5; }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 1rem;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover:not(:disabled) { background-color: var(--accent-color); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .global-spinner {
            width: 40px;
            height: 40px;
            border-color: rgba(47, 79, 79, 0.2);
            border-top-color: var(--primary-color);
            margin: 0 auto 1rem auto;
        }

        .hidden { display: none !important; }
        
        .error-message { 
            color: var(--error-color); 
            font-size: 14px; 
            margin-top: 15px; 
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
            border-left: 4px solid var(--error-color);
            text-align: left;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Polite live region for screen reader announcements -->
    <div id="sr-announcer" class="sr-only" aria-live="polite"></div>

    <div class="container">
        <!-- Initial Loading State -->
        <div id="app-loading">
            <div class="spinner global-spinner" aria-hidden="true"></div>
            <p>Loading your planner...</p>
        </div>
        
        <!-- Bug 4 Fix: Global Error Boundary UI -->
        <div id="init-error" class="error-message hidden" role="alert"></div>

        <!-- Login View -->
        <div id="login-view" class="hidden">
            <h1 id="login-heading" tabindex="-1">🏕️ Outdoor Planner</h1>
            <p>Plan your Camp, RV Trip, or Picnic effortlessly.</p>
            
            <!-- Bug 10 Fix: Explicit aria-label overrides internal SVG and text for screen readers -->
            <button id="login-btn" aria-label="Continue with Google">
                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9086c1.7018-1.5668 2.6836-3.874 2.6836-6.615z"></path><path fill="#34A853" d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9086-2.2581c-.8059.54-1.8368.859-3.0478.859-2.344 0-4.3282-1.5831-5.036-3.7104H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z"></path><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.2822-1.1168-.2822-1.71s.1023-1.17.2823-1.71V4.9582H.9573A8.9965 8.9965 0 0 0 0 9c0 1.4523.3477 2.8268.9573 4.0418L3.964 10.71z"></path><path fill="#EA4335" d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.426 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9582L3.964 7.29C4.6718 5.1627 6.6559 3.5795 9 3.5795z"></path></svg>
                <span aria-hidden="true">Continue with Google</span>
                <div class="spinner hidden" id="login-spinner" aria-hidden="true"></div>
            </button>
            <div id="login-error" class="error-message hidden" role="alert"></div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="hidden">
            <img id="user-photo" src="" alt="User Profile" class="profile-pic hidden" />
            <h1 id="dashboard-heading" tabindex="-1">Welcome, <span id="user-name"></span>! 🎒</h1>
            <p id="user-email" class="sr-only"></p>
            <p>Ready to plan your next adventure?</p>
            
            <button id="logout-btn">
                Log Out
                <div class="spinner hidden" id="logout-spinner" aria-hidden="true"></div>
            </button>
            <div id="logout-error" class="error-message hidden" role="alert"></div>
        </div>
    </div>

    <script type="module">
        /*
         * BUG HISTORY & FIXES LOG
         * ---------------------------------------------------------------------------------------------------
         * [Previous 18 Bugs]: Fixed race conditions, memory leaks, explicit session persistence, 
         * replaced alert() dialogs, personalized dashboard, blocked spam clicks, fixed mobile flex layouts,
         * offline checking, aria-hidden properties on SVG/spinners, removed inline CSS.
         * 
         * [Bug 1]: Fixed App Crash on Hot Reload (Added getApps() check before initializeApp).
         * [Bug 2]: Fixed Memory Leak (Exposed unsubscribeAuth to window for proper teardown).
         * [Bug 3]: Fixed Returning User Focus (Added logic for previousAuthState === null).
         *[Bug 4]: Added Error Boundary (Used dynamic imports wrapped in try/catch to handle CDN blocks).
         * [Bug 5]: Fixed Safari ITP breakage (Removed popupRedirectResolver from initializeAuth).
         *[Bug 6]: Fixed Infinite Spinner (Added 10s authTimeout fallback for slow/hanging connections).
         *[Bug 7]: Fixed Language Sync (Called auth.useDeviceLanguage() immediately upon init).
         * [Bug 8]: Fixed Broken Image UI (Added userPhoto.onerror handler).
         * [Bug 9]: Fixed SR Announcement repetitions (Cleared srAnnouncer before updating with setTimeout).
         * [Bug 10]: Fixed SR SVG reading (Added aria-label="Continue with Google" on button).
         * [Bug 11]: Fixed Blank Name for " " displayNames (Added .trim() and length > 0 checks).
         * [Bug 12]: Fixed RTL Layout (Added dir="auto" to <html> tag).
         * [Bug 13]: Fixed dvh undocumented issue (Added rich CSS comments for future maintainers).
         * [Bug 14]: Fixed HTTPS strict enforcement (Added window.location.protocol check).
         * ---------------------------------------------------------------------------------------------------
         */

        // DOM Elements
        const appLoading = document.getElementById('app-loading');
        const initError = document.getElementById('init-error');
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginSpinner = document.getElementById('login-spinner');
        const logoutSpinner = document.getElementById('logout-spinner');
        
        const userNameDisplay = document.getElementById('user-name');
        const userEmailDisplay = document.getElementById('user-email');
        const userPhoto = document.getElementById('user-photo');
        
        const loginError = document.getElementById('login-error');
        const logoutError = document.getElementById('logout-error');
        
        const loginHeading = document.getElementById('login-heading');
        const dashboardHeading = document.getElementById('dashboard-heading');
        const srAnnouncer = document.getElementById('sr-announcer');

        // Bug 14 Fix: Enforce HTTPS for Google Auth
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (window.location.protocol !== 'https:' && !isLocalhost) {
            appLoading.classList.add('hidden');
            initError.textContent = "Security Error: This application requires an HTTPS connection for secure sign-in.";
            initError.classList.remove('hidden');
            throw new Error("Insecure context blocked.");
        }

        // Bug 9 Fix: Helper to ensure screen readers always catch state changes
        function announceToScreenReader(message) {
            srAnnouncer.textContent = ''; // Clear old content
            setTimeout(() => { srAnnouncer.textContent = message; }, 50); // Re-inject to force announcement
        }

        async function initApp() {
            try {
                // Bug 4 Fix: Dynamic imports act as an Error Boundary against CDN/Ad-blocker failures
                const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js");
                const { 
                    initializeAuth, 
                    getAuth,
                    signInWithPopup, 
                    GoogleAuthProvider, 
                    signOut, 
                    onAuthStateChanged,
                    browserLocalPersistence,
                    browserPopupRedirectResolver
                } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js");

                const firebaseConfig = {
                    apiKey: "AIzaSyBLGsNTiudr0Z8fGc2xc4hK4Nl96_vwPHc",
                    authDomain: "camp-cbf1d.firebaseapp.com",
                    projectId: "camp-cbf1d",
                    storageBucket: "camp-cbf1d.firebasestorage.app",
                    messagingSenderId: "879899618290",
                    appId: "1:879899618290:web:c71c1626e5a5fa0a96596b",
                    measurementId: "G-9R2C1174BG"
                };

                // Bug 1 Fix: Re-initialization guard for SPAs and Hot-Reload environments
                let app, auth;
                if (!getApps().length) {
                    app = initializeApp(firebaseConfig);
                    // Bug 5 Fix: Removed `browserPopupRedirectResolver` from here to prevent Safari ITP crash
                    auth = initializeAuth(app, {
                        persistence: browserLocalPersistence
                    });
                } else {
                    app = getApp();
                    auth = getAuth(app);
                }

                // Bug 7 Fix: Called immediately after auth creation
                auth.useDeviceLanguage();
                const provider = new GoogleAuthProvider();

                let isAuthResolved = false;
                let previousAuthState = null;

                // Bug 6 Fix: Fallback timeout if Firebase backend hangs
                const authTimeout = setTimeout(() => {
                    if (!isAuthResolved) {
                        appLoading.classList.add('hidden');
                        initError.textContent = "Connection is slow. Firebase authentication is taking too long to respond. Please check your network and refresh.";
                        initError.classList.remove('hidden');
                    }
                }, 10000);

                // Bug 2 Fix: Expose unsubscribe to global scope for memory leak prevention in SPA frameworks
                window.unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                    isAuthResolved = true;
                    clearTimeout(authTimeout);
                    appLoading.classList.add('hidden');

                    if (user) {
                        // Bug 11 Fix: Safe displayName handling for blank-space anomalies
                        let name = user.displayName ? user.displayName.trim() : '';
                        userNameDisplay.textContent = name.length > 0 ? name.split(' ')[0] : 'Camper';
                        userEmailDisplay.textContent = `Logged in as ${user.email}`;
                        
                        if (user.photoURL) {
                            userPhoto.src = user.photoURL;
                            userPhoto.classList.remove('hidden');
                            // Bug 8 Fix: Fallback if Google photo CDN returns 404/403
                            userPhoto.onerror = () => userPhoto.classList.add('hidden');
                        } else {
                            userPhoto.classList.add('hidden');
                        }

                        loginView.classList.add('hidden');
                        dashboardView.classList.remove('hidden');

                        // Bug 3 Fix: Handle focus/announcements even for returning users on first load
                        if (previousAuthState !== true) {
                            if (previousAuthState !== null) dashboardHeading.focus();
                            announceToScreenReader("Successfully signed in. Welcome to your dashboard.");
                        }
                        previousAuthState = true;

                    } else {
                        dashboardView.classList.add('hidden');
                        loginView.classList.remove('hidden');

                        if (previousAuthState !== false) {
                            if (previousAuthState !== null) {
                                loginHeading.focus();
                                announceToScreenReader("Successfully signed out.");
                            } else {
                                announceToScreenReader("Login page loaded.");
                            }
                        }
                        previousAuthState = false;
                    }
                });

                // Login Logic
                loginBtn.addEventListener('click', async () => {
                    loginError.classList.add('hidden');

                    if (!navigator.onLine) {
                        loginError.textContent = "You appear to be offline. Please check your connection.";
                        loginError.classList.remove('hidden');
                        return;
                    }

                    loginBtn.disabled = true;
                    loginSpinner.classList.remove('hidden');

                    try {
                        // Bug 5 Fix: Resolver passed dynamically ONLY at the time of popup call
                        await signInWithPopup(auth, provider, browserPopupRedirectResolver);
                    } catch (error) {
                        console.error("Login Error:", error);
                        
                        const ignoredErrors =['auth/popup-closed-by-user', 'auth/cancelled-popup-request'];
                        if (!ignoredErrors.includes(error.code)) {
                            loginError.textContent = error.code === 'auth/network-request-failed' 
                                ? "Network error. Please check your internet connection." 
                                : "Failed to sign in. Please try again.";
                            loginError.classList.remove('hidden');
                        }
                    } finally {
                        loginBtn.disabled = false;
                        loginSpinner.classList.add('hidden');
                    }
                });

                // Logout Logic
                logoutBtn.addEventListener('click', async () => {
                    logoutError.classList.add('hidden');
                    logoutBtn.disabled = true;
                    logoutSpinner.classList.remove('hidden');

                    try {
                        await signOut(auth);
                    } catch (error) {
                        console.error("Logout Error:", error);
                        logoutError.textContent = "Failed to log out safely. Please check your connection.";
                        logoutError.classList.remove('hidden');
                    } finally {
                        logoutBtn.disabled = false;
                        logoutSpinner.classList.add('hidden');
                    }
                });

            } catch (error) {
                // Bug 4 Fix: Graceful handling if CDN / Import fails
                appLoading.classList.add('hidden');
                initError.textContent = "Failed to load application modules. Please disable ad-blockers or check your connection, then refresh.";
                initError.classList.remove('hidden');
                console.error("Initialization Error:", error);
            }
        }

        // Boot the app safely
        initApp();
    </script>
</body>
</html>
