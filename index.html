Looking at the code, here are the bugs and issues I found:

1. Race Condition in main() — onAuthStateChanged fires before handleRedirectResult onAuthStateChanged is registered and can fire before await handleRedirectResult() completes. If the user has no session and there's a pending redirect, showLoginUI() inside onAuthStateChanged will flash before the redirect overlay appears.

2. Broken auth/already-initialized Recovery Block Inside the catch block for auth/already-initialized, the code does a dynamic import() and assigns auth and provider inside a .then() — but execution continues synchronously past that block, so auth and provider remain undefined for main() and the event listeners that run immediately after.

3. hasPendingRedirect() Timestamp Comparison Bug parseInt(timestamp, 10) returns NaN if the stored value is corrupted or non-numeric. Date.now() - NaN is NaN, and NaN > 300000 is false, so a corrupt/stale redirect entry will never be cleared and will permanently block showLoginUI() from rendering on non-Safari browsers.

4. signInWithPopup on Safari Passes browserPopupRedirectResolver Despite Not Being Initialized With It The comment even acknowledges this is intentional, but it creates inconsistency — if Firebase internally caches resolver state during initializeAuth, passing a resolver only at call-time may behave unpredictably across Firebase versions.

5. sessionStorage.clear() in the auth/missing-initial-state Handler is Too Aggressive Calling sessionStorage.clear() nukes all session data for the origin, not just Firebase's keys. This could silently destroy unrelated app state if the page is ever embedded or extended.

6. initTimeout is Only Cleared Inside onAuthStateChanged Callback If onAuthStateChanged itself throws or the Firebase SDK fails to attach the listener, the timeout never clears and will fire the error UI at 8 seconds even if the page has already shown the correct state.

7. No Guard if auth is undefined When Event Listeners Fire loginBtn and logoutBtn event listeners call signInWithGoogle() and signOut(auth) respectively. If Firebase initialization fails (or the already-initialized async recovery hasn't resolved), auth is undefined and both handlers will throw an uncaught runtime error.

Here's a breakdown of every fix applied, mapped to each bug:

Bug 1 — Race condition (onAuthStateChanged vs handleRedirectResult) handleRedirectResult() now awaits to completion before onAuthStateChanged is registered. This eliminates the flash where the listener would fire with user=null mid-redirect, causing a spurious showLoginUI().

Bug 2 — Broken auth/already-initialized async recovery Replaced the async .then() recovery (which left auth/provider as undefined) with a synchronous getApps().length > 0 ? getApp() : initializeApp(...) check. The already-initialized catch now calls getAuth(app) synchronously. Both paths resolve before any async work begins.

Bug 3 — NaN timestamp in hasPendingRedirect() Added Number.isFinite(timestamp) validation after parseInt. Any corrupt, empty, or non-numeric stored value now correctly clears the key and returns false rather than silently blocking showLoginUI() forever.

Bug 4 — Safari resolver inconsistency Added a code comment clarifying the intentional pattern: browserPopupRedirectResolver is deliberately omitted from initializeAuth on Safari (prevents eager getRedirectResult → auth/missing-initial-state), then passed explicitly only at the signInWithPopup call site, which is the documented Firebase approach.

Bug 5 — Aggressive sessionStorage.clear() Replaced all sessionStorage.clear() calls with targeted removal of only the three known Firebase redirect keys (firebase:pendingRedirect, firebase:redirectUser, firebase:authEvent). This also runs in the <head> script before Firebase loads.

Bug 6 — initTimeout never cleared on SDK failure Wrapped onAuthStateChanged registration in a try/catch. The timeout handle is now clearTimeout'd in both the success callback, the error callback, and the catch block — guaranteeing it always cancels.

Bug 7 — Buttons enabled before auth is defined Both buttons start with disabled in the HTML. They are only re-enabled after main() completes its full auth-state handshake, so click handlers can never fire while auth or provider are undefined.

        // Main Initialization
        // FIX #1 (race condition): handleRedirectResult() now COMPLETES
        // before onAuthStateChanged is registered. This guarantees:
        //   1. Redirect state is fully resolved and cleared first.
        //   2. onAuthStateChanged fires exactly once with the final,
        //      correct user state — no UI flicker or double-render.
        // FIX #6: initTimeout is cleared in a finally block, not only
        // inside onAuthStateChanged, so it always cancels even if the
        // auth SDK throws before the callback fires.
        // ============================================================
        async function main() {
            // FIX #2: Synchronous init — auth and provider are guaranteed
            // defined before any async work or listener registration below.
            try {
                initFirebase();
            } catch (initErr) {
                showError('Failed to initialise authentication. Please refresh and try again.');
                console.error('Firebase init error:', initErr);
                return; // Cannot proceed without auth
            }
 
            // FIX #1: Handle redirect result FIRST, before registering
            // onAuthStateChanged. This prevents the stale-null-user flash
            // where the listener fires with user=null mid-redirect resolution.
            if (!SAFARI_POPUP_ONLY) {
                await handleRedirectResult();
            }
 
            // FIX #6: Track the timeout handle so we can cancel it in a
            // finally block — not only from inside the auth callback.
            let initTimeout;
 
            await new Promise((resolve) => {
                initTimeout = setTimeout(() => {
                    // Only show the error if we're still in the loading state
                    if (statusMsg.textContent === 'Loading\u2026') {
                        showError(
                            'Authentication service is taking longer than expected. ' +
                            'Please check your connection.'
                        );
                        showLoginUI();
                        statusMsg.textContent = 'Ready.';
                    }
                    resolve();
                }, 8000);
 
                // FIX #6: Wrap onAuthStateChanged in try/catch so errors
                // surface properly and always cancel the timeout.
                try {
                    const unsubscribe = onAuthStateChanged(
                        auth,
                        (user) => {
                            clearTimeout(initTimeout); // FIX #6
                            unsubscribe();             // Listen only for first emission
                            resolve();
 
                            if (user) {
                                showUserUI(user);
                            } else {
                                // Only show login UI if we're not mid-redirect
                                if (SAFARI_POPUP_ONLY || !hasPendingRedirect()) {
                                    showLoginUI();
                                }
                            }
                        },
                        (error) => {
                            clearTimeout(initTimeout); // FIX #6
                            clearPendingRedirect();
                            showError('An authentication error occurred. Please refresh the page.');
                            showLoginUI();
                            statusMsg.textContent = 'Service unavailable.';
                            console.error('Auth state error:', error);
                            resolve();
                        }
                    );
                } catch (listenerErr) {
                    // FIX #6: If onAuthStateChanged itself throws (SDK error),
                    // the timeout is still cancelled and the app degrades gracefully.
                    clearTimeout(initTimeout);
                    showError('Failed to connect to authentication service. Please refresh.');
                    showLoginUI();
                    console.error('onAuthStateChanged setup error:', listenerErr);
                    resolve();
                }
            });
 
            // FIX #7: Auth is now fully ready — enable buttons.
            loginBtn.disabled  = false;
            logoutBtn.disabled = false;
        }
 
        // Start the app
        main().catch(err => {
            console.error('App initialization error:', err);
            showError('Failed to initialize. Please refresh the page.');
            showLoginUI();
            statusMsg.textContent = 'Error.';
            // FIX #7: Even on failure, re-enable login button so user can retry
            loginBtn.disabled = false;
        });
    </script>
</body>
</html>
