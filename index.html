<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camp & Trip Planner</title>
    <style>
        :root {
            --primary-color: #2F4F4F; /* Dark Slate Gray for outdoor theme */
            --accent-color: #D2691E; /* Chocolate/Wood color */
            --bg-color: #F5F5DC; /* Beige */
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: var(--primary-color); }
        p { color: #666; margin-bottom: 2rem; }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover:not(:disabled) { background-color: var(--accent-color); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Views */
        #dashboard-view { display: none; }
        #error-message { color: red; font-size: 14px; margin-top: 15px; display: none; }
        .user-info { margin-bottom: 20px; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Login View -->
        <div id="login-view">
            <h1>🏕️ Outdoor Planner</h1>
            <p>Plan your Camp, RV Trip, or Picnic easily.</p>
            <button id="login-btn" aria-label="Login with Google">
                <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9086c1.7018-1.5668 2.6836-3.874 2.6836-6.615z"></path><path fill="#34A853" d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9086-2.2581c-.8059.54-1.8368.859-3.0478.859-2.344 0-4.3282-1.5831-5.036-3.7104H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z"></path><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.2822-1.1168-.2822-1.71s.1023-1.17.2823-1.71V4.9582H.9573A8.9965 8.9965 0 0 0 0 9c0 1.4523.3477 2.8268.9573 4.0418L3.964 10.71z"></path><path fill="#EA4335" d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.426 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9582L3.964 7.29C4.6718 5.1627 6.6559 3.5795 9 3.5795z"></path></svg>
                Continue with Google
                <div class="spinner" id="login-spinner"></div>
            </button>
            <div id="error-message"></div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view">
            <h1>Welcome Back! 🎒</h1>
            <div class="user-info" id="user-email"></div>
            <p>Ready to plan your next adventure?</p>
            <!-- Navigation links to your planner app features would go here -->
            <button id="logout-btn" aria-label="Log out of the application">
                Log Out
                <div class="spinner" id="logout-spinner"></div>
            </button>
        </div>
    </div>

    <!-- Firebase v10 Modular SDKs via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged, 
            setPersistence, 
            browserLocalPersistence 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBLGsNTiudr0Z8fGc2xc4hK4Nl96_vwPHc",
            authDomain: "camp-cbf1d.firebaseapp.com",
            projectId: "camp-cbf1d",
            storageBucket: "camp-cbf1d.firebasestorage.app",
            messagingSenderId: "879899618290",
            appId: "1:879899618290:web:c71c1626e5a5fa0a96596b",
            measurementId: "G-9R2C1174BG"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Ensure session remains until explicitly logged out
        setPersistence(auth, browserLocalPersistence).catch((error) => {
            console.error("Error setting auth persistence:", error);
        });

        // Use device language for the Google Auth Popup
        auth.useDeviceLanguage();

        // DOM Elements
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginSpinner = document.getElementById('login-spinner');
        const logoutSpinner = document.getElementById('logout-spinner');
        const userEmailDisplay = document.getElementById('user-email');
        const errorMessage = document.getElementById('error-message');

        // Monitor Auth State (Fires on load and on login/logout)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in
                loginView.style.display = 'none';
                dashboardView.style.display = 'block';
                userEmailDisplay.textContent = user.email; // e.g. girishsancheti@gmail.com
            } else {
                // User is signed out
                loginView.style.display = 'block';
                dashboardView.style.display = 'none';
                userEmailDisplay.textContent = '';
            }
        });

        // Login Handler
        loginBtn.addEventListener('click', async () => {
            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loginSpinner.style.display = 'block';

            try {
                await signInWithPopup(auth, provider);
                // Note: UI update is handled automatically by onAuthStateChanged
            } catch (error) {
                console.error("Login Error:", error);
                // Handle user closing popup gracefully
                if (error.code !== 'auth/popup-closed-by-user') {
                    errorMessage.textContent = "Failed to sign in. Please try again.";
                    errorMessage.style.display = 'block';
                }
            } finally {
                loginBtn.disabled = false;
                loginSpinner.style.display = 'none';
            }
        });

        // Logout Handler
        logoutBtn.addEventListener('click', async () => {
            logoutBtn.disabled = true;
            logoutSpinner.style.display = 'block';

            try {
                await signOut(auth);
                // UI update handled by onAuthStateChanged
            } catch (error) {
                console.error("Logout Error:", error);
                alert("Failed to log out. Please check your connection.");
            } finally {
                logoutBtn.disabled = false;
                logoutSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
