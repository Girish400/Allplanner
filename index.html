<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner - Login</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9f4;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 { color: #2e7d32; margin-top: 0; }

        .btn {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            transition: background 0.3s ease, opacity 0.2s ease;
        }

        .btn:hover:not(:disabled) { background-color: #3367D6; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-logout { background-color: #d32f2f; margin-top: 10px; }
        .btn-logout:hover:not(:disabled) { background-color: #b71c1c; }

        .hidden { display: none !important; }

        #user-info { margin-top: 20px; }

        #profile-pic {
            border-radius: 50%;
            width: 70px;
            height: 70px;
            border: 3px solid #2e7d32;
            object-fit: cover;
            background-color: #e8f5e9;
        }

        #error-message {
            color: #c62828;
            background: #ffebee;
            border-radius: 6px;
            padding: 10px 14px;
            margin-top: 12px;
            font-size: 14px;
            text-align: left;
        }

        #info-message {
            color: #1565c0;
            background: #e3f2fd;
            border-radius: 6px;
            padding: 10px 14px;
            margin-top: 12px;
            font-size: 14px;
            text-align: left;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #redirect-overlay {
            position: fixed;
            inset: 0;
            background: rgba(244, 249, 244, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-size: 15px;
            color: #2c3e50;
            z-index: 100;
        }
        #redirect-overlay .big-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #c8e6c9;
            border-top-color: #2e7d32;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .status-text { font-size: 14px; color: #555; margin: 0 0 4px; }
    </style>
</head>
<body>

    <div id="redirect-overlay" class="hidden" aria-live="polite" aria-label="Completing sign-in">
        <div class="big-spinner"></div>
        <span>Completing sign-in&hellip;</span>
    </div>

    <div class="login-container" role="main">
        <h1>&#127957;&#65039; Trip Planner</h1>
        <p id="status-message" class="status-text" aria-live="polite">Loading&hellip;</p>

        <div id="error-message" class="hidden" role="alert" aria-live="assertive"></div>
        <div id="info-message"  class="hidden" aria-live="polite"></div>

        <div id="login-section" class="hidden">
            <button class="btn" id="login-btn" type="button" aria-label="Sign in with your Google account">
                Sign in with Google
            </button>
        </div>

        <div id="user-info" class="hidden" aria-live="polite">
            <img id="profile-pic" alt="Profile picture" src="">
            <h3 id="user-name" aria-label="Logged-in user name"></h3>
            <p id="user-email" style="font-size:14px;color:#555;word-break:break-all;"></p>
            <button class="btn btn-logout" id="logout-btn" type="button" aria-label="Sign out of your account">
                Sign Out
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import {
            getAuth,
            signInWithPopup,
            signInWithRedirect,
            getRedirectResult,
            GoogleAuthProvider,
            signOut,
            onAuthStateChanged,
            setPersistence,
            browserLocalPersistence,
            indexedDBLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyBLGsNTiudr0Z8fGc2xc4hK4Nl96_vwPHc",
            authDomain:        "camp-cbf1d.firebaseapp.com",
            projectId:         "camp-cbf1d",
            storageBucket:     "camp-cbf1d.firebasestorage.app",
            messagingSenderId: "879899618290",
            appId:             "1:879899618290:web:c71c1626e5a5fa0a96596b",
            measurementId:     "G-9R2C1174BG"
        };

        // DOM refs
        const loginBtn        = document.getElementById('login-btn');
        const logoutBtn       = document.getElementById('logout-btn');
        const loginSection    = document.getElementById('login-section');
        const userInfoSec     = document.getElementById('user-info');
        const profilePic      = document.getElementById('profile-pic');
        const userName        = document.getElementById('user-name');
        const userEmail       = document.getElementById('user-email');
        const statusMsg       = document.getElementById('status-message');
        const errorMsg        = document.getElementById('error-message');
        const infoMsg         = document.getElementById('info-message');
        const redirectOverlay = document.getElementById('redirect-overlay');

        const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 70 70%22><circle cx=%2235%22 cy=%2235%22 r=%2235%22 fill=%22%23c8e6c9%22/><text x=%2235%22 y=%2241%22 text-anchor=%22middle%22 font-size=%2228%22 fill=%22%232e7d32%22>&#128100;</text></svg>';

        // Detect Safari (desktop + iOS).
        function isSafari() {
            const ua = navigator.userAgent;
            return /^((?!chrome|android|crios|fxios).)*safari/i.test(ua);
        }

        // Detect iOS (Safari or any browser on iOS)
        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                   (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        }

        const IS_SAFARI = isSafari();
        const IS_IOS = isIOS();

        // Use localStorage for Safari redirect state (more reliable than sessionStorage)
        const REDIRECT_KEY = 'firebase_auth_pending_redirect';

        function setPendingRedirect() {
            try {
                localStorage.setItem(REDIRECT_KEY, Date.now().toString());
            } catch (e) {
                // Fallback: try sessionStorage
                try { sessionStorage.setItem(REDIRECT_KEY, 'true'); } catch (e2) {}
            }
        }

        function clearPendingRedirect() {
            try {
                localStorage.removeItem(REDIRECT_KEY);
                sessionStorage.removeItem(REDIRECT_KEY);
            } catch (e) {}
        }

        function hasPendingRedirect() {
            try {
                const timestamp = localStorage.getItem(REDIRECT_KEY);
                if (timestamp) {
                    // Clear if older than 5 minutes (stale redirect)
                    if (Date.now() - parseInt(timestamp) > 5 * 60 * 1000) {
                        clearPendingRedirect();
                        return false;
                    }
                    return true;
                }
                return sessionStorage.getItem(REDIRECT_KEY) === 'true';
            } catch (e) {
                return false;
            }
        }

        // Helpers
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            infoMsg.classList.add('hidden');
        }

        function clearError() {
            errorMsg.textContent = '';
            errorMsg.classList.add('hidden');
        }

        function showInfo(msg) {
            infoMsg.textContent = msg;
            infoMsg.classList.remove('hidden');
            errorMsg.classList.add('hidden');
        }

        function clearInfo() {
            infoMsg.textContent = '';
            infoMsg.classList.add('hidden');
        }

        function setLoading(button, loading) {
            if (loading) {
                button.disabled = true;
                const s = document.createElement('span');
                s.className = 'spinner';
                s.setAttribute('aria-hidden', 'true');
                button.prepend(s);
            } else {
                button.disabled = false;
                const s = button.querySelector('.spinner');
                if (s) s.remove();
            }
        }

        function isTrustedPhotoUrl(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const u = new URL(url);
                return ['lh3.googleusercontent.com', 'googleusercontent.com'].includes(u.hostname);
            } catch { return false; }
        }

        function showUserUI(user) {
            loginSection.classList.add('hidden');
            userInfoSec.classList.remove('hidden');
            redirectOverlay.classList.add('hidden');
            profilePic.src        = isTrustedPhotoUrl(user.photoURL) ? user.photoURL : DEFAULT_AVATAR;
            userName.textContent  = user.displayName || 'Traveler';
            userEmail.textContent = user.email || '';
            statusMsg.textContent = 'Welcome back, ' + (user.displayName || 'Traveler').split(' ')[0] + '!';
            setLoading(logoutBtn, false);
        }

        function showLoginUI() {
            loginSection.classList.remove('hidden');
            userInfoSec.classList.add('hidden');
            redirectOverlay.classList.add('hidden');
            statusMsg.textContent = 'Please sign in to plan your trip.';
            profilePic.src        = '';
            userName.textContent  = '';
            userEmail.textContent = '';
            setLoading(loginBtn, false);
        }

        // Firebase init
        let auth, provider;
        try {
            const app = initializeApp(firebaseConfig);
            auth      = getAuth(app);
            provider  = new GoogleAuthProvider();
            provider.addScope('profile');
            provider.addScope('email');
            // For Safari: set prompt to 'select_account' to force account selection
            // This can help with some Safari redirect issues
            provider.setCustomParameters({
                prompt: 'select_account'
            });
        } catch (initErr) {
            showError('Failed to initialise authentication. Please refresh and try again.');
            console.error('Firebase init error:', initErr);
            throw initErr;
        }

        // Safari-compatible sign-in function
        async function signInWithGoogle() {
            clearError();
            clearInfo();
            setLoading(loginBtn, true);

            // For Safari/iOS: Try popup first (works better in newer Safari versions)
            // If popup fails, fall back to redirect
            if (IS_SAFARI || IS_IOS) {
                try {
                    // First, try popup - it works in Safari 16.4+ and iOS 16.4+
                    // The key is that it's triggered by a direct user click
                    const result = await signInWithPopup(auth, provider);
                    // Success! onAuthStateChanged will handle the UI
                    return;
                } catch (popupError) {
                    console.log('Safari popup failed, trying redirect:', popupError.code);
                    
                    // Check if it's a user-cancellation - don't fall back to redirect
                    if (popupError.code === 'auth/popup-closed-by-user' ||
                        popupError.code === 'auth/cancelled-popup-request') {
                        statusMsg.textContent = 'Sign-in cancelled. Please try again.';
                        setLoading(loginBtn, false);
                        return;
                    }
                    
                    // For popup blocked or other errors, try redirect
                    if (popupError.code === 'auth/popup-blocked' ||
                        popupError.code === 'auth/operation-not-supported-in-this-environment' ||
                        popupError.code === 'auth/unauthorized-domain') {
                        
                        showInfo('Opening Google sign-in page...');
                        setPendingRedirect();
                        
                        try {
                            await signInWithRedirect(auth, provider);
                            // Page navigates away
                        } catch (redirectError) {
                            clearPendingRedirect();
                            showError('Sign-in failed. Please ensure popups are allowed for this site.');
                            console.error('Redirect error:', redirectError);
                            setLoading(loginBtn, false);
                        }
                        return;
                    }
                    
                    // Network or other errors
                    if (popupError.code === 'auth/network-request-failed' || !navigator.onLine) {
                        showError('Network error. Please check your internet connection.');
                    } else {
                        showError('Sign-in failed. Please try again.');
                        console.error('Login error:', popupError);
                    }
                    setLoading(loginBtn, false);
                    return;
                }
            }

            // Chrome / Firefox / Edge: use popup flow directly
            try {
                await signInWithPopup(auth, provider);
                // onAuthStateChanged handles UI
            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user' ||
                    error.code === 'auth/cancelled-popup-request') {
                    statusMsg.textContent = 'Sign-in cancelled. Please try again.';
                } else if (error.code === 'auth/popup-blocked') {
                    // Popup blocked: auto-fallback to redirect
                    showInfo('Popup was blocked. Redirecting you to Google sign-in...');
                    setPendingRedirect();
                    setTimeout(() => signInWithRedirect(auth, provider), 1200);
                    return;
                } else if (error.code === 'auth/network-request-failed' || !navigator.onLine) {
                    showError('Network error. Please check your internet connection.');
                } else {
                    showError('Sign-in failed. Please try again.');
                    console.error('Login error:', error);
                }
                setLoading(loginBtn, false);
            }
        }

        // Initialize auth persistence with Safari-compatible option
        async function initializeAuth() {
            try {
                // For Safari: indexedDBLocalPersistence is more reliable than browserLocalPersistence
                // as it's less affected by ITP (Intelligent Tracking Prevention)
                if (IS_SAFARI || IS_IOS) {
                    try {
                        await setPersistence(auth, indexedDBLocalPersistence);
                    } catch (e) {
                        // Fallback to browserLocalPersistence if IndexedDB fails
                        await setPersistence(auth, browserLocalPersistence);
                    }
                } else {
                    await setPersistence(auth, browserLocalPersistence);
                }
            } catch (e) {
                console.warn('Could not set persistence:', e);
            }
        }

        // Handle redirect result
        async function handleRedirectResult() {
            const hadPendingRedirect = hasPendingRedirect();
            
            if (hadPendingRedirect) {
                redirectOverlay.classList.remove('hidden');
                statusMsg.textContent = 'Completing sign-in...';
            }

            try {
                await initializeAuth();
                const result = await getRedirectResult(auth);
                
                if (result && result.user) {
                    clearPendingRedirect();
                    redirectOverlay.classList.add('hidden');
                    // onAuthStateChanged will handle showing the user UI
                    return true;
                }
                
                // No result but we had a pending redirect - might be Safari ITP issue
                if (hadPendingRedirect) {
                    clearPendingRedirect();
                    redirectOverlay.classList.add('hidden');
                    
                    // Check if we're already signed in (auth state might have been restored)
                    if (auth.currentUser) {
                        return true;
                    }
                    
                    // Safari might have cleared the auth state due to ITP
                    // Show a helpful message
                    showInfo('If sign-in did not complete, please try again. Tip: Make sure "Prevent cross-site tracking" is disabled in Safari settings, or try using Chrome.');
                }
            } catch (error) {
                clearPendingRedirect();
                redirectOverlay.classList.add('hidden');
                
                if (error.code === 'auth/network-request-failed') {
                    showError('Network error during sign-in. Please check your connection.');
                } else if (error.code && error.code !== 'auth/no-auth-event') {
                    // For Safari, provide more specific guidance
                    if (IS_SAFARI || IS_IOS) {
                        showError('Sign-in was interrupted. This can happen due to Safari privacy settings. Try disabling "Prevent cross-site tracking" in Safari settings, or use Chrome for the best experience.');
                    } else {
                        showError('Sign-in was interrupted. Please try again.');
                    }
                    console.error('Redirect result error:', error);
                }
            }
            return false;
        }

        // Login button handler
        loginBtn.addEventListener('click', signInWithGoogle);

        // Logout
        logoutBtn.addEventListener('click', async () => {
            clearError();
            setLoading(logoutBtn, true);
            try {
                await signOut(auth);
                // onAuthStateChanged fires and calls showLoginUI()
            } catch (error) {
                showError('Sign-out failed. Please check your connection and try again.');
                console.error('Logout error:', error);
                setLoading(logoutBtn, false);
            }
        });

        // Auth state listener
        const initTimeout = setTimeout(() => {
            if (statusMsg.textContent === 'Loading\u2026') {
                showError('Authentication service is taking longer than expected. Please check your connection.');
                loginSection.classList.remove('hidden');
                redirectOverlay.classList.add('hidden');
                statusMsg.textContent = 'Ready.';
            }
        }, 8000);

        onAuthStateChanged(auth, (user) => {
            clearTimeout(initTimeout);
            clearError();

            if (user) {
                showUserUI(user);
            } else {
                // Don't flip to login UI if a redirect is in progress
                if (!hasPendingRedirect()) {
                    showLoginUI();
                }
            }
        }, (error) => {
            clearTimeout(initTimeout);
            clearPendingRedirect();
            showError('An authentication error occurred. Please refresh the page.');
            loginSection.classList.remove('hidden');
            redirectOverlay.classList.add('hidden');
            statusMsg.textContent = 'Service unavailable.';
            console.error('Auth state error:', error);
        });

        // Initialize and handle any pending redirect
        handleRedirectResult();
    </script>
</body>
</html>
