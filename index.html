<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner - Login</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9f4;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 { color: #2e7d32; margin-top: 0; }

        .btn {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            transition: background 0.3s ease, opacity 0.2s ease;
        }
        
        .btn:hover:not(:disabled) { background-color: #3367D6; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-logout { background-color: #d32f2f; margin-top: 10px; }
        .btn-logout:hover:not(:disabled) { background-color: #b71c1c; }

        /* Unified hidden class for all state toggles */
        .hidden { display: none !important; }

        #user-info { margin-top: 20px; }

        #profile-pic {
            border-radius: 50%;
            width: 70px;
            height: 70px;
            border: 3px solid #2e7d32;
            object-fit: cover;
            background-color: #e8f5e9;
        }

        #error-message {
            color: #c62828;
            background: #ffebee;
            border-radius: 6px;
            padding: 10px 14px;
            margin-top: 12px;
            font-size: 14px;
            text-align: left;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text { font-size: 14px; color: #555; margin: 0 0 4px; }
    </style>
</head>
<body>

    <div class="login-container" role="main">
        <h1>🏕️ Trip Planner</h1>
        <p id="status-message" class="status-text" aria-live="polite">Loading…</p>

        <div id="error-message" class="hidden" role="alert" aria-live="assertive"></div>

        <div id="login-section" class="hidden">
            <button class="btn" id="login-btn" type="button" aria-label="Sign in with your Google account">
                Sign in with Google
            </button>
        </div>

        <div id="user-info" class="hidden" aria-live="polite">
            <img id="profile-pic" alt="Profile picture" src="">
            <h3 id="user-name" aria-label="Logged-in user name"></h3>
            <p id="user-email" style="font-size:14px;color:#555;word-break:break-all;"></p>
            <button class="btn btn-logout" id="logout-btn" type="button" aria-label="Sign out of your account">
                Sign Out
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import {
            getAuth, signInWithPopup, GoogleAuthProvider, signOut,
            onAuthStateChanged, setPersistence, browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLGsNTiudr0Z8fGc2xc4hK4Nl96_vwPHc",
            authDomain: "camp-cbf1d.firebaseapp.com",
            projectId: "camp-cbf1d",
            storageBucket: "camp-cbf1d.firebasestorage.app",
            messagingSenderId: "879899618290",
            appId: "1:879899618290:web:c71c1626e5a5fa0a96596b",
            measurementId: "G-9R2C1174BG"
        };

        const loginBtn      = document.getElementById('login-btn');
        const logoutBtn     = document.getElementById('logout-btn');
        const loginSection  = document.getElementById('login-section');
        const userInfoSec   = document.getElementById('user-info');
        const profilePic    = document.getElementById('profile-pic');
        const userName      = document.getElementById('user-name');
        const userEmail     = document.getElementById('user-email');
        const statusMsg     = document.getElementById('status-message');
        const errorMsg      = document.getElementById('error-message');

        const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 70 70%22><circle cx=%2235%22 cy=%2235%22 r=%2235%22 fill=%22%23c8e6c9%22/><text x=%2235%22 y=%2241%22 text-anchor=%22middle%22 font-size=%2228%22 fill=%22%232e7d32%22>👤</text></svg>';

        // ── Helpers ────────────────────────────────────────────────────────────
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }

        function clearError() {
            errorMsg.textContent = '';
            errorMsg.classList.add('hidden');
        }

        function setLoading(button, loading) {
            if (loading) {
                button.disabled = true;
                const spinner = document.createElement('span');
                spinner.className = 'spinner';
                spinner.setAttribute('aria-hidden', 'true');
                button.prepend(spinner);
            } else {
                button.disabled = false;
                const spinner = button.querySelector('.spinner');
                if (spinner) spinner.remove();
            }
        }

        function isTrustedPhotoUrl(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const u = new URL(url);
                return ['lh3.googleusercontent.com', 'googleusercontent.com'].includes(u.hostname);
            } catch {
                return false;
            }
        }

        // ── Init ───────────────────────────────────────────────────────────────
        let app, auth, provider;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            provider = new GoogleAuthProvider();
            provider.addScope('profile');
            provider.addScope('email');
        } catch (initErr) {
            showError('Failed to initialise authentication. Please refresh and try again.');
            throw initErr;
        }

        // ── Login / Logout ─────────────────────────────────────────────────────
        loginBtn.addEventListener('click', async () => {
            clearError();
            setLoading(loginBtn, true);
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, provider);
            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user' || error.code === 'auth/cancelled-popup-request') {
                    statusMsg.textContent = 'Sign-in cancelled. Please try again.';
                } else if (error.code === 'auth/popup-blocked') {
                    showError('Popup was blocked by your browser. Please allow popups for this site and try again.');
                } else if (error.code === 'auth/network-request-failed' || !navigator.onLine) {
                    showError('Network error. Please check your internet connection.');
                } else {
                    showError('Sign-in failed. Please try again.');
                    console.error('Login error:', error);
                }
            } finally {
                setLoading(loginBtn, false);
            }
        });

        logoutBtn.addEventListener('click', async () => {
            clearError();
            setLoading(logoutBtn, true);
            try {
                await signOut(auth);
            } catch (error) {
                showError('Sign-out failed. Please check your connection and try again.');
                console.error('Logout error:', error);
                setLoading(logoutBtn, false);
            }
        });

        // ── Auth State ─────────────────────────────────────────────────────────
        const initTimeout = setTimeout(() => {
            if (statusMsg.textContent === 'Loading…') {
                showError('Authentication service is taking longer than expected. Please check your connection.');
                loginSection.classList.remove('hidden'); // Failsafe: let them try anyway
                statusMsg.textContent = 'Ready.';
            }
        }, 8000);

        onAuthStateChanged(auth, (user) => {
            clearTimeout(initTimeout);
            clearError();

            if (user) {
                loginSection.classList.add('hidden');
                userInfoSec.classList.remove('hidden');

                profilePic.src = isTrustedPhotoUrl(user.photoURL) ? user.photoURL : DEFAULT_AVATAR;
                
                // Using .textContent natively prevents XSS injection
                userName.textContent  = user.displayName || 'Traveler';
                userEmail.textContent = user.email || '';
                statusMsg.textContent = `Welcome back, ${userName.textContent.split(' ')[0]}!`;

                setLoading(logoutBtn, false);
            } else {
                loginSection.classList.remove('hidden');
                userInfoSec.classList.add('hidden');
                statusMsg.textContent = 'Please sign in to plan your trip.';

                profilePic.src = '';
                userName.textContent = '';
                userEmail.textContent = '';

                setLoading(loginBtn, false);
            }
        }, (error) => {
            clearTimeout(initTimeout);
            showError('An authentication error occurred. Please refresh the page.');
            loginSection.classList.remove('hidden');
            statusMsg.textContent = 'Service unavailable.';
        });
    </script>
</body>
</html>
