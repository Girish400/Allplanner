<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Camp Planner Login</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
}

.container {
  background: #1e293b;
  padding: 2rem;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

.login-btn { background: #22c55e; }
.logout-btn { background: #ef4444; }
.retry-btn { background: #3b82f6; }

.hidden { display: none; }

#error {
  margin-top: 10px;
  color: #f87171;
}

</style>
</head>

<body>
<div class="container">

  <h2 id="title">Camp Planner</h2>

  <!-- LOGIN -->
  <div id="loginView">
    <button id="loginBtn" class="login-btn">Continue with Google</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardView" class="hidden">
    <p id="welcome"></p>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>

  <button id="retryBtn" class="retry-btn hidden">Retry</button>
  <div id="error" role="alert" aria-live="assertive"></div>
  <div id="sr" aria-live="polite" style="position:absolute;left:-9999px;"></div>

</div>

<script type="module">
import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBLGsNTiudr0Z8fGc2xc4hK4Nl96_vwPHc",
  authDomain: "camp-cbf1d.firebaseapp.com",
  projectId: "camp-cbf1d",
  storageBucket: "camp-cbf1d.firebasestorage.app",
  messagingSenderId: "879899618290",
  appId: "1:879899618290:web:c71c1626e5a5fa0a96596b"
};

/* ================= DOM ================= */
const DOM = {
  loginBtn: document.getElementById("loginBtn"),
  logoutBtn: document.getElementById("logoutBtn"),
  retryBtn: document.getElementById("retryBtn"),
  loginView: document.getElementById("loginView"),
  dashboardView: document.getElementById("dashboardView"),
  welcome: document.getElementById("welcome"),
  error: document.getElementById("error"),
  sr: document.getElementById("sr")
};

/* ================= STATE ================= */
let auth;
let unsubscribe = null;
let initRunning = false;
let authResolved = false;
let timeoutRef = null;

/* ================= UTIL ================= */

function announce(msg) {
  DOM.sr.textContent = "";
  setTimeout(() => DOM.sr.textContent = msg, 100);
}

function showError(msg) {
  DOM.error.textContent = msg;
}

function clearError() {
  DOM.error.textContent = "";
}

function toggleLoading(disabled) {
  DOM.loginBtn.disabled = disabled;
  DOM.logoutBtn.disabled = disabled;
}

function showLogin() {
  DOM.loginView.classList.remove("hidden");
  DOM.dashboardView.classList.add("hidden");
}

function showDashboard(user) {
  DOM.loginView.classList.add("hidden");
  DOM.dashboardView.classList.remove("hidden");

  DOM.welcome.textContent =
    "Welcome " + (user.displayName || user.email);
}

/* ================= INIT ================= */

async function initApp() {
  if (initRunning) return;
  initRunning = true;

  clearError();
  DOM.retryBtn.classList.add("hidden");

  try {
    if (!navigator.onLine) {
      throw new Error("You are offline");
    }

    const app = initializeApp(firebaseConfig);
    auth = getAuth(app);

    // CRITICAL FIX: persistence BEFORE listener
    await setPersistence(auth, browserLocalPersistence);

    const provider = new GoogleAuthProvider();

    // CLEAN previous listener
    if (unsubscribe) {
      unsubscribe();
      unsubscribe = null;
    }

    authResolved = false;

    // TIMEOUT protection
    timeoutRef = setTimeout(() => {
      if (!authResolved) {
        showError("Auth timeout. Check connection.");
        DOM.retryBtn.classList.remove("hidden");
      }
    }, 8000);

    unsubscribe = onAuthStateChanged(auth, (user) => {
      authResolved = true;
      clearTimeout(timeoutRef);

      if (user) {
        showDashboard(user);
        announce("Logged in");
      } else {
        showLogin();
      }
    });

    /* ===== HANDLERS ===== */

    DOM.loginBtn.onclick = async () => {
      clearError();

      if (!navigator.onLine) {
        showError("You are offline");
        return;
      }

      toggleLoading(true);

      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        if (e.code === "auth/cancelled-popup-request") return;
        showError("Login failed");
      }

      toggleLoading(false);
    };

    DOM.logoutBtn.onclick = async () => {
      try {
        await signOut(auth);
        announce("Logged out");
      } catch {
        showError("Logout failed");
      }
    };

    DOM.retryBtn.onclick = () => {
      initRunning = false;
      initApp();
    };

  } catch (e) {
    showError(e.message || "Initialization failed");
    DOM.retryBtn.classList.remove("hidden");
  }

  initRunning = false;
}

/* ================= START ================= */
initApp();

/* ================= CLEANUP ================= */
window.addEventListener("beforeunload", () => {
  if (unsubscribe) unsubscribe();
});

</script>
</body>
</html>
