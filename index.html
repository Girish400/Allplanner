<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Planner - Login</title>
    <style>
        /* ... existing styles ... */
        .error-message { color: #d32f2f; font-size: 0.9rem; margin-top: 10px; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #2e7d32; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Briefly: Trip Planner</h1>
        <p id="status-message">Connecting to basecamp...</p>
        <div id="error-display" class="error-message hidden"></div>

        <div id="login-section" class="hidden">
            <button class="btn" id="login-btn">
                <span>Sign in with Google</span>
            </button>
        </div>

        <div id="user-info" class="hidden">
            <img id="profile-pic" src="" alt="User profile">
            <h3 id="user-name"></h3>
            <p id="user-email"></p>
            <button class="btn btn-logout" id="logout-btn">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged,
            setPersistence,
            browserLocalPersistence 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLGsNTiudr0Z8fGc2xc4hK4Nl96_vwPHc", // Note: Restrict this in Firebase Console
            authDomain: "camp-cbf1d.firebaseapp.com",
            projectId: "camp-cbf1d",
            storageBucket: "camp-cbf1d.firebasestorage.app",
            messagingSenderId: "879899618290",
            appId: "1:879899618290:web:c71c1626e5a5fa0a96596b"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const elements = {
            loginBtn: document.getElementById('login-btn'),
            logoutBtn: document.getElementById('logout-btn'),
            loginSection: document.getElementById('login-section'),
            userInfoSection: document.getElementById('user-info'),
            profilePic: document.getElementById('profile-pic'),
            userName: document.getElementById('user-name'),
            userEmail: document.getElementById('user-email'),
            statusMessage: document.getElementById('status-message'),
            errorDisplay: document.getElementById('error-display')
        };

        const showError = (msg) => {
            elements.errorDisplay.textContent = msg;
            elements.errorDisplay.classList.remove('hidden');
        };

        // UI State Switcher
        const updateUI = (user) => {
            elements.errorDisplay.classList.add('hidden');
            if (user) {
                elements.loginSection.classList.add('hidden');
                elements.userInfoSection.classList.remove('hidden');
                elements.profilePic.src = user.photoURL || 'https://via.placeholder.com/70';
                elements.profilePic.alt = user.displayName || 'User';
                elements.userName.textContent = user.displayName;
                elements.userEmail.textContent = user.email;
                elements.statusMessage.textContent = "Welcome back, Traveler!";
            } else {
                elements.loginSection.classList.remove('hidden');
                elements.userInfoSection.classList.add('hidden');
                elements.statusMessage.textContent = "Please sign in to plan your trip.";
            }
        };

        // Logic
        elements.loginBtn.addEventListener('click', async () => {
            try {
                elements.loginBtn.disabled = true;
                elements.statusMessage.textContent = "Authenticating...";
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, provider);
            } catch (error) {
                showError("Auth Error: " + error.message);
                elements.statusMessage.textContent = "Sign in failed.";
            } finally {
                elements.loginBtn.disabled = false;
            }
        });

        elements.logoutBtn.addEventListener('click', () => {
            signOut(auth).catch(err => showError("Logout failed: " + err.message));
        });

        onAuthStateChanged(auth, updateUI);
    </script>
</body>
</html>
